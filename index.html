<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Star Chart</title>
<meta name="theme-color" content="#0B1026" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Star Chart" />
<style>
  :root{
    --navy:#0B1026; --navy2:#141A3C; --gold:#FFD66B;
    --text:#ECEAF7; --muted:#9aa0c4;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;min-height:100%;}
  body{
    font-family:'Quicksand',ui-rounded,"SF Pro Rounded",system-ui,-apple-system,Segoe UI,sans-serif;
    color:var(--text);
    background:radial-gradient(120% 80% at 50% -10%, #1b2150 0%, var(--navy) 55%, #070a1c 100%);
    background-attachment:fixed;
    padding:max(24px,env(safe-area-inset-top)) 16px 40px;
    display:flex;justify-content:center;
  }
  .shell{width:100%;max-width:460px;}
  .headerRow{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:14px;}
  .kicker{font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:var(--muted);font-weight:600;}
  h1{font-size:30px;font-weight:700;margin:2px 0 0;line-height:1.1;}
  .iconBtn{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--text);
    border-radius:12px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;}
  .goalLine{display:flex;align-items:center;gap:8px;font-size:15px;margin-bottom:18px;min-height:22px;}
  .goalLine strong{color:var(--text);}
  .muted{color:var(--muted);}
  .editCard{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);border-radius:16px;padding:16px;margin-bottom:18px;}
  .fieldLabel{display:block;font-size:12px;color:var(--muted);margin:4px 0 6px;font-weight:600;}
  input{width:100%;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.14);border-radius:10px;
    color:var(--text);padding:10px 12px;font-size:15px;font-family:inherit;margin-bottom:4px;}
  input:focus{outline:2px solid var(--gold);outline-offset:1px;}
  .row{display:flex;gap:8px;margin-top:10px;}
  .sky{position:relative;height:300px;border-radius:24px;overflow:hidden;
    background:radial-gradient(130% 100% at 50% 0%, #232b5e 0%, var(--navy2) 45%, #090d22 100%);
    border:1px solid rgba(255,255,255,.08);box-shadow:0 18px 50px rgba(0,0,0,.5);margin-bottom:18px;}
  .sky.complete{box-shadow:0 0 60px rgba(255,214,107,.25) inset,0 18px 50px rgba(0,0,0,.5);}
  .neb{position:absolute;filter:blur(6px);}
  .neb1{width:220px;height:220px;left:-40px;top:-30px;background:radial-gradient(circle,rgba(120,90,220,.35),transparent 70%);}
  .neb2{width:200px;height:200px;right:-30px;bottom:-40px;background:radial-gradient(circle,rgba(70,140,220,.28),transparent 70%);}
  .star{position:absolute;transform:translate(-50%,-50%);}
  .star.lit{animation:twk 3.2s ease-in-out infinite;}
  @keyframes twk{0%,100%{opacity:1;}50%{opacity:.55;}}
  .moon{position:absolute;left:50%;top:38px;width:78px;height:78px;border-radius:50%;
    background:radial-gradient(circle at 35% 35%,#FFF6DA,#FAD98A 60%,#E7B85f);
    box-shadow:0 0 50px rgba(255,228,160,.7);animation:moonrise 1.1s ease-out both;transform:translate(-50%,0);}
  @keyframes moonrise{from{transform:translate(-50%,40px);opacity:0;}to{transform:translate(-50%,0);opacity:1;}}
  .countWrap{position:absolute;left:0;right:0;bottom:22px;text-align:center;z-index:2;}
  .countNum{font-size:52px;font-weight:700;line-height:1;text-shadow:0 2px 18px rgba(0,0,0,.6);}
  .countNum span{font-size:26px;color:var(--muted);font-weight:600;}
  .countLabel{font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-top:4px;font-weight:600;}
  .completeBig{font-size:26px;font-weight:700;color:var(--gold);text-shadow:0 0 20px rgba(255,214,107,.6);}
  .completeReward{font-size:16px;margin-top:4px;}
  button.act{width:100%;border:none;border-radius:16px;padding:16px;font-size:17px;font-weight:700;font-family:inherit;
    color:#1a1330;background:linear-gradient(180deg,#FFE08A,#F5B841);box-shadow:0 8px 24px rgba(245,184,65,.35);
    cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  .doneState{width:100%;border-radius:16px;padding:16px;font-size:15px;font-weight:600;
    background:rgba(255,214,107,.1);border:1px solid rgba(255,214,107,.3);display:flex;align-items:center;justify-content:center;gap:8px;}
  .stats{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:16px;}
  .statCell{text-align:center;flex:1;}
  .statNum{font-size:24px;font-weight:700;}
  .statLbl{font-size:12px;color:var(--muted);margin-top:2px;font-weight:600;}
  .statDivider{width:1px;height:34px;background:rgba(255,255,255,.1);}
  .disclosure{width:100%;margin-top:20px;background:transparent;border:none;color:var(--muted);font-family:inherit;
    font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:6px;cursor:pointer;}
  .panel{margin-top:14px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:16px;}
  .panelTitle{font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);font-weight:700;margin:0 0 10px;}
  .insight{font-size:14px;line-height:1.45;margin:0 0 14px;}
  .insight strong{color:var(--gold);}
  .wkRow{display:flex;align-items:center;gap:10px;margin:7px 0;}
  .wkLbl{width:34px;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;}
  .wkTrack{flex:1;height:10px;border-radius:6px;background:rgba(255,255,255,.06);overflow:hidden;}
  .wkFill{height:100%;border-radius:6px;background:linear-gradient(90deg,#F5B841,#FFE08A);}
  .wkFill.low{background:linear-gradient(90deg,#c8657a,#e58aa0);}
  .wkCount{width:42px;text-align:right;font-size:12px;color:var(--muted);font-variant-numeric:tabular-nums;flex-shrink:0;}
  .calHead{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
  .calNav{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:var(--text);
    width:32px;height:32px;border-radius:9px;cursor:pointer;font-size:15px;font-family:inherit;}
  .calNav:disabled{opacity:.3;cursor:default;}
  .calMonth{font-size:15px;font-weight:700;}
  .calGrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
  .calDow{font-size:10px;color:var(--muted);text-align:center;font-weight:700;padding-bottom:2px;}
  .cal-cell{aspect-ratio:1;border-radius:9px;display:flex;flex-direction:column;align-items:center;justify-content:center;
    gap:1px;font-size:12px;position:relative;border:1px solid transparent;}
  .cal-cell.empty{background:transparent;}
  .cal-cell.out{color:rgba(232,230,245,.25);}
  .cal-cell.earned{background:rgba(255,214,107,.16);border-color:rgba(255,214,107,.5);cursor:pointer;}
  .cal-cell.missed{background:rgba(255,255,255,.04);border-color:rgba(255,255,255,.07);color:var(--muted);cursor:pointer;}
  .cal-cell.today{outline:2px solid rgba(232,230,245,.55);outline-offset:-2px;}
  .cal-num{line-height:1;}
  .footer{text-align:center;font-size:12px;color:var(--muted);margin-top:24px;}
  button:focus-visible,.cal-cell:focus-visible{outline:2px solid var(--gold);outline-offset:2px;}
  @media (prefers-reduced-motion: reduce){.star.lit,.moon{animation:none!important;}}
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="shell" id="shell"></div>

<script>
const KEY = "medstar:state";
const DEFAULT = { rewardName:"", goal:60, takenDates:[], startDate:null };

const pad = n => String(n).padStart(2,"0");
const toKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayKey = () => toKey(new Date());
const addDays = (d,n)=>{const x=new Date(d);x.setDate(x.getDate()+n);return x;};
const parseKey = k => { const [y,m,dd]=k.split("-").map(Number); return new Date(y,m-1,dd); };
const startOfToday = () => { const t=new Date(); t.setHours(0,0,0,0); return t; };
const firstOfMonth = d => new Date(d.getFullYear(), d.getMonth(), 1);

function load(){
  let s;
  try{ const r=localStorage.getItem(KEY); s = r ? JSON.parse(r) : {...DEFAULT}; }
  catch(e){ s={...DEFAULT}; }
  // migrate: ensure a start date so "missed" days are well defined
  if(!s.startDate){
    s.startDate = s.takenDates && s.takenDates.length
      ? s.takenDates.slice().sort()[0]
      : todayKey();
  }
  return s;
}
function save(s){ try{ localStorage.setItem(KEY, JSON.stringify(s)); }catch(e){} }

let state = load();
let editing = false, showHist = false;
let calMonth = firstOfMonth(new Date());

function mulberry32(a){return function(){a|=0;a=(a+0x6d2b79f5)|0;let t=Math.imul(a^(a>>>15),1|a);
  t=(t+Math.imul(t^(t>>>7),61|t))^t;return((t^(t>>>14))>>>0)/4294967296;};}
function starField(goal){const rand=mulberry32(1337+goal);
  return Array.from({length:goal},()=>({left:6+rand()*88,top:10+rand()*78,size:7+rand()*9,delay:rand()*4}));}

function streak(){
  const set=new Set(state.takenDates); let c=0, cur=new Date();
  if(!set.has(toKey(cur))) cur=addDays(cur,-1);
  while(set.has(toKey(cur))){c++;cur=addDays(cur,-1);} return c;
}

function weekdayStats(){
  const set=new Set(state.takenDates);
  const start=parseKey(state.startDate); const today=startOfToday();
  const tot=[0,0,0,0,0,0,0], earned=[0,0,0,0,0,0,0];
  for(let d=new Date(start); d<=today; d=addDays(d,1)){
    const wd=d.getDay(); tot[wd]++; if(set.has(toKey(d))) earned[wd]++;
  }
  return {tot,earned};
}

function commit(next){ state=next; save(state); render(); }

function markToday(){ const k=todayKey(); if(state.takenDates.includes(k)) return;
  commit({...state, takenDates:[...state.takenDates,k]}); }
function toggleDay(k){ const has=state.takenDates.includes(k);
  commit({...state, takenDates: has ? state.takenDates.filter(x=>x!==k) : [...state.takenDates,k]}); }
function saveSettings(){
  const rn=document.getElementById("rwd").value.trim();
  const g=Math.max(1,Math.min(365,parseInt(document.getElementById("gl").value,10)||60));
  editing=false; commit({...state, rewardName:rn, goal:g});
}
function resetChart(){
  if(!confirm("Start a new chart? This clears all earned stars and your history.")) return;
  commit({...DEFAULT, rewardName:state.rewardName, goal:state.goal, startDate:todayKey()});
}

const starSVG=(size,lit)=>`<svg width="${size}" height="${size}" viewBox="0 0 24 24"
  fill="${lit?'#FFD66B':'transparent'}" stroke="${lit?'none':'rgba(232,230,245,0.16)'}" stroke-width="1.25"
  style="${lit?'filter:drop-shadow(0 0 5px rgba(255,214,107,.9))':''}">
  <polygon points="12,2 15,9 22,9.3 16.5,14 18.5,21 12,17 5.5,21 7.5,14 2,9.3 9,9"/></svg>`;

function escapeHtml(s){return (s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]));}

function patternsHTML(){
  const ws=weekdayStats();
  const order=[1,2,3,4,5,6,0];
  const labels={0:"Sun",1:"Mon",2:"Tue",3:"Wed",4:"Thu",5:"Fri",6:"Sat"};
  const full={0:"Sundays",1:"Mondays",2:"Tuesdays",3:"Wednesdays",4:"Thursdays",5:"Fridays",6:"Saturdays"};
  const totalTracked=ws.tot.reduce((a,b)=>a+b,0);

  // most-missed weekday (lowest earned rate among days with at least 2 occurrences)
  let worst=-1, worstRate=2;
  order.forEach(wd=>{
    if(ws.tot[wd]>=2){ const rate=ws.earned[wd]/ws.tot[wd];
      if(rate<worstRate){worstRate=rate;worst=wd;} }
  });

  let insight;
  if(totalTracked<7){
    insight=`<p class="insight muted">Patterns appear after about a week of tracking.</p>`;
  } else if(worst===-1 || worstRate>=1){
    insight=`<p class="insight">No gaps yet — every tracked day has a star. Nice.</p>`;
  } else {
    const missed=ws.tot[worst]-ws.earned[worst];
    insight=`<p class="insight">You miss <strong>${full[worst]}</strong> most — ${missed} missed of ${ws.tot[worst]} so far.</p>`;
  }

  const bars=order.map(wd=>{
    const t=ws.tot[wd], e=ws.earned[wd];
    const rate=t?e/t:0; const pct=Math.round(rate*100);
    const low=(wd===worst && totalTracked>=7 && worstRate<1);
    return `<div class="wkRow">
      <span class="wkLbl">${labels[wd]}</span>
      <span class="wkTrack"><span class="wkFill ${low?'low':''}" style="width:${pct}%"></span></span>
      <span class="wkCount">${e}/${t}</span></div>`;
  }).join("");

  return `<div class="panel">
    <p class="panelTitle">Patterns by weekday</p>
    ${insight}${bars}</div>`;
}

function calendarHTML(){
  const set=new Set(state.takenDates);
  const start=parseKey(state.startDate); start.setHours(0,0,0,0);
  const today=startOfToday();
  const y=calMonth.getFullYear(), m=calMonth.getMonth();
  const monthLabel=calMonth.toLocaleDateString(undefined,{month:"long",year:"numeric"});
  const lead=(new Date(y,m,1).getDay()+6)%7; // Monday-first
  const daysInMonth=new Date(y,m+1,0).getDate();

  const canPrev=firstOfMonth(calMonth)>firstOfMonth(start);
  const canNext=firstOfMonth(calMonth)<firstOfMonth(today);

  const dows=["Mo","Tu","We","Th","Fr","Sa","Su"].map(d=>`<div class="calDow">${d}</div>`).join("");

  let cells="";
  for(let i=0;i<lead;i++) cells+=`<div class="cal-cell empty"></div>`;
  for(let day=1;day<=daysInMonth;day++){
    const c=new Date(y,m,day); c.setHours(0,0,0,0);
    const k=toKey(c);
    const earned=set.has(k);
    const inWindow=(c>=start && c<=today);
    const isToday=k===todayKey();
    let cls="cal-cell";
    if(earned) cls+=" earned"; else if(inWindow) cls+=" missed"; else cls+=" out";
    if(isToday) cls+=" today";
    const tap=inWindow ? `data-k="${k}" role="button" tabindex="0"` : "";
    cells+=`<div class="${cls}" ${tap}><span class="cal-num">${day}</span>${earned?starSVG(11,true):""}</div>`;
  }

  return `<div class="panel">
    <div class="calHead">
      <button class="calNav" id="calPrev" ${canPrev?"":"disabled"} aria-label="Previous month">‹</button>
      <span class="calMonth">${monthLabel}</span>
      <button class="calNav" id="calNext" ${canNext?"":"disabled"} aria-label="Next month">›</button>
    </div>
    <div class="calGrid">${dows}${cells}</div>
    <p class="footer" style="margin-top:12px">Tap any day to add or remove its star.</p>
  </div>`;
}

function render(){
  const earned=state.takenDates.length;
  const goal=state.goal||60;
  const complete=earned>=goal;
  const remaining=Math.max(0,goal-earned);
  const doneToday=state.takenDates.includes(todayKey());
  const field=starField(goal);

  const starsHTML=field.map((s,i)=>{const lit=i<earned;
    return `<span class="star ${lit?'lit':''}" style="left:${s.left}%;top:${s.top}%;animation-delay:${s.delay}s">${starSVG(s.size,lit)}</span>`;
  }).join("");

  const rewardLine=state.rewardName
    ? `Working toward <strong>${escapeHtml(state.rewardName)}</strong>`
    : `<span class="muted">Tap the pencil to name your reward</span>`;

  const center=complete
    ? `<div class="completeBig">Reward unlocked</div>${state.rewardName?`<div class="completeReward">${escapeHtml(state.rewardName)}</div>`:""}`
    : `<div class="countNum">${earned}<span> / ${goal}</span></div><div class="countLabel">stars earned</div>`;

  const action=complete
    ? `<button class="act" id="reset">↻ Start a new chart</button>`
    : doneToday
      ? `<div class="doneState">✓ Today's star is earned — see you tomorrow</div>`
      : `<button class="act" id="mark">★ Earn today's star</button>`;

  document.getElementById("shell").innerHTML=`
    <div class="headerRow">
      <div><div class="kicker">Daily medication</div><h1>Star Chart</h1></div>
      <button class="iconBtn" id="edit" aria-label="Edit reward and goal">✎</button>
    </div>
    ${editing ? `
      <div class="editCard">
        <label class="fieldLabel">Reward at the end</label>
        <input id="rwd" value="${escapeHtml(state.rewardName)}" placeholder="e.g. a trip to the zoo">
        <label class="fieldLabel">Stars needed</label>
        <input id="gl" value="${goal}" inputmode="numeric">
        <div class="row"><button class="small act" id="saveSet" style="padding:12px">Save</button>
        <button class="iconBtn" id="cancelSet" style="width:auto;padding:0 16px">Cancel</button></div>
      </div>`
    : `<div class="goalLine">✨ <span>${rewardLine}</span></div>`}
    <div class="sky ${complete?'complete':''}">
      <div class="neb neb1"></div><div class="neb neb2"></div>
      ${starsHTML}${complete?'<div class="moon"></div>':''}
      <div class="countWrap">${center}</div>
    </div>
    ${action}
    <div class="stats">
      <div class="statCell"><div class="statNum">${streak()}</div><div class="statLbl">day streak</div></div>
      <div class="statDivider"></div>
      <div class="statCell"><div class="statNum">${remaining}</div><div class="statLbl">${remaining===1?'star to go':'stars to go'}</div></div>
    </div>
    <button class="disclosure" id="histToggle">History &amp; patterns ${showHist?'▲':'▼'}</button>
    ${showHist ? patternsHTML()+calendarHTML() : ''}
    <div class="footer">Saved on this device. Add to your home screen to use it like an app.</div>
  `;
  wire();
}

function wire(){
  const byId=id=>document.getElementById(id);
  byId("edit")?.addEventListener("click",()=>{editing=!editing;render();});
  byId("mark")?.addEventListener("click",markToday);
  byId("reset")?.addEventListener("click",resetChart);
  byId("saveSet")?.addEventListener("click",saveSettings);
  byId("cancelSet")?.addEventListener("click",()=>{editing=false;render();});
  byId("histToggle")?.addEventListener("click",()=>{showHist=!showHist;render();});
  byId("calPrev")?.addEventListener("click",()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()-1,1);render();});
  byId("calNext")?.addEventListener("click",()=>{calMonth=new Date(calMonth.getFullYear(),calMonth.getMonth()+1,1);render();});
  document.querySelectorAll("[data-k]").forEach(el=>{
    el.addEventListener("click",()=>toggleDay(el.getAttribute("data-k")));
    el.addEventListener("keydown",e=>{if(e.key==="Enter"||e.key===" "){e.preventDefault();toggleDay(el.getAttribute("data-k"));}});
  });
}

render();
